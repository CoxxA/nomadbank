services:
  nomadbank:
    image: ghcr.io/coxxa/nomadbank:${NOMADBANK_VERSION:-latest}
    build:
      context: .
      args:
        VERSION: ${NOMADBANK_VERSION:-dev}
    ports:
      - "${NOMADBANK_PORT:-8080}:8080"
    environment:
      SESSION_DAYS: ${SESSION_DAYS:-30}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - nomadbank_data:/data
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

volumes:
  nomadbank_data:
    name: nomadbank_data
