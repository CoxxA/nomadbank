name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '正式版本号（例如 2.0.0，不要带 v）'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  prepare:
    name: Validate release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      image: ${{ steps.release.outputs.image }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Validate branch, commit, and version
        id: release
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "::error::Releases must be started from the main branch."
            exit 1
          fi

          git fetch --quiet origin main --tags
          remote_main="$(git rev-parse origin/main)"
          if [[ "$GITHUB_SHA" != "$remote_main" ]]; then
            echo "::error::The selected commit is not the latest commit on main."
            exit 1
          fi

          version="${INPUT_VERSION//[[:space:]]/}"
          if [[ ! "$version" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "::error::Version must use X.Y.Z format without a leading v."
            exit 1
          fi

          tag="v${version}"
          major="${version%%.*}"
          module_path="$(sed -n 's/^module[[:space:]]\+//p' go.mod | head -n 1)"
          if (( major >= 2 )); then
            if [[ "$module_path" != */v"$major" ]]; then
              echo "::error::Go module ${module_path} must end in /v${major} before releasing ${tag}."
              exit 1
            fi
          elif [[ "$module_path" =~ /v[2-9][0-9]*$ ]]; then
            echo "::error::Go module ${module_path} is not compatible with release ${tag}."
            exit 1
          fi

          if ! grep -Fq "## [${version}]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md must contain a ## [${version}] release section."
            exit 1
          fi

          if git show-ref --tags --verify --quiet "refs/tags/${tag}"; then
            echo "::error::Tag ${tag} already exists. Choose a new version."
            exit 1
          fi
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error::Release ${tag} already exists. Choose a new version."
            exit 1
          fi

          latest_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n 1)"
          if [[ -n "$latest_tag" ]]; then
            newest="$(printf '%s\n%s\n' "$latest_tag" "$tag" | sort -V | tail -n 1)"
            if [[ "$newest" != "$tag" ]]; then
              echo "::error::Version ${tag} must be newer than ${latest_tag}."
              exit 1
            fi
          fi

          repository="${GITHUB_REPOSITORY,,}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "image=${REGISTRY}/${repository}" >> "$GITHUB_OUTPUT"
          echo "Preparing ${tag} from ${GITHUB_SHA}."

  verify:
    name: Run full CI
    needs: prepare
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  binaries:
    name: Build release assets
    runs-on: ubuntu-latest
    needs: [prepare, verify]
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.x'
          check-latest: true
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build and package binaries
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          TAG: ${{ needs.prepare.outputs.tag }}
          COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p build dist
          ldflags="-s -w -X main.version=${TAG} -X main.commit=${COMMIT}"

          for target in \
            linux/amd64 linux/arm64 \
            darwin/amd64 darwin/arm64 \
            windows/amd64 windows/arm64
          do
            os="${target%/*}"
            arch="${target#*/}"
            package_dir="build/${os}-${arch}"
            binary="nomadbank"
            if [[ "$os" == "windows" ]]; then
              binary="nomadbank.exe"
            fi

            mkdir -p "$package_dir"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -trimpath -ldflags "$ldflags" \
              -o "${package_dir}/${binary}" ./cmd/nomadbank
            cp README.md LICENSE "$package_dir/"

            archive="nomadbank_${VERSION}_${os}_${arch}"
            if [[ "$os" == "windows" ]]; then
              (cd "$package_dir" && zip -q -r "${GITHUB_WORKSPACE}/dist/${archive}.zip" .)
            else
              tar -C "$package_dir" -czf "${GITHUB_WORKSPACE}/dist/${archive}.tar.gz" .
            fi
          done

      - name: Stage dependency manifests for SBOM
        shell: bash
        run: |
          mkdir -p build/sbom-source/frontend
          cp go.mod go.sum build/sbom-source/
          cp frontend/package.json frontend/package-lock.json build/sbom-source/frontend/

      - name: Generate SPDX SBOM
        env:
          SYFT_SOURCE_NAME: NomadBank
          SYFT_SOURCE_VERSION: ${{ needs.prepare.outputs.version }}
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: build/sbom-source
          config: .github/syft-release.yaml
          format: spdx-json
          output-file: dist/nomadbank_${{ needs.prepare.outputs.version }}_sbom.spdx.json
          syft-version: v1.44.0
          upload-artifact: false
          upload-release-assets: false

      - name: Verify application SBOM coverage
        shell: bash
        env:
          SBOM: dist/nomadbank_${{ needs.prepare.outputs.version }}_sbom.spdx.json
        run: |
          set -euo pipefail
          jq -e '[.. | strings | select(startswith("pkg:golang/"))] | length > 0' "$SBOM" >/dev/null
          jq -e '[.. | strings | select(startswith("pkg:npm/"))] | length > 0' "$SBOM" >/dev/null

      - name: Generate checksums
        working-directory: dist
        shell: bash
        run: sha256sum nomadbank_* > SHA256SUMS

      - name: Attest binary provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip

      - name: Attest binary SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
          sbom-path: dist/nomadbank_${{ needs.prepare.outputs.version }}_sbom.spdx.json

      - name: Upload release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-assets-${{ needs.prepare.outputs.tag }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  smoke_binaries:
    name: Smoke ${{ matrix.name }} archive
    runs-on: ${{ matrix.runner }}
    needs: [prepare, binaries]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux amd64
            runner: ubuntu-24.04
            archive_suffix: linux_amd64.tar.gz
          - name: Windows amd64
            runner: windows-2025
            archive_suffix: windows_amd64.zip
          - name: macOS arm64
            runner: macos-15
            archive_suffix: darwin_arm64.tar.gz
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Download release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-assets-${{ needs.prepare.outputs.tag }}
          path: dist

      - name: Start and verify packaged application
        shell: pwsh
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          TAG: ${{ needs.prepare.outputs.tag }}
          COMMIT: ${{ github.sha }}
        run: ./scripts/smoke-release.ps1 -Archive "dist/nomadbank_${env:VERSION}_${{ matrix.archive_suffix }}" -ExpectedVersion $env:TAG -ExpectedCommit $env:COMMIT

  image:
    name: Publish container image
    runs-on: ubuntu-latest
    needs: [prepare, verify, binaries, smoke_binaries]
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ needs.prepare.outputs.image }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.prepare.outputs.tag }}

      - name: Build and push image
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.tag }}
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Attest container provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-name: ${{ needs.prepare.outputs.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Download application SBOM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-assets-${{ needs.prepare.outputs.tag }}
          path: dist

      - name: Attest container application SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-name: ${{ needs.prepare.outputs.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          sbom-path: dist/nomadbank_${{ needs.prepare.outputs.version }}_sbom.spdx.json
          push-to-registry: true

      - name: Smoke test published image digest
        shell: bash
        env:
          IMAGE: ${{ needs.prepare.outputs.image }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          docker run --detach --name nomadbank-release-smoke \
            --publish 127.0.0.1:8080:8080 "${IMAGE}@${DIGEST}"
          trap 'docker rm --force --volumes nomadbank-release-smoke >/dev/null 2>&1' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8080/health/ready >/dev/null; then
              curl --fail --silent http://127.0.0.1:8080/ >/dev/null
              exit 0
            fi
            sleep 1
          done
          docker logs nomadbank-release-smoke
          exit 1

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare, binaries, smoke_binaries, image]
    permissions:
      contents: write
    steps:
      - name: Download release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-assets-${{ needs.prepare.outputs.tag }}
          path: dist

      - name: Verify checksums
        working-directory: dist
        run: sha256sum --check SHA256SUMS

      - name: Create immutable-ready GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          gh release create "$TAG" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "NomadBank $TAG" \
            --generate-notes \
            --fail-on-no-commits \
            --latest

  promote_image:
    name: Promote rolling image tags
    runs-on: ubuntu-latest
    needs: [prepare, image, publish]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Update minor, major, and latest tags
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          IMAGE: ${{ needs.prepare.outputs.image }}
          DIGEST: ${{ needs.image.outputs.digest }}
        run: |
          set -euo pipefail
          if [[ ! "$DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "::error::Invalid image digest: $DIGEST"
            exit 1
          fi

          minor="${VERSION%.*}"
          major="${VERSION%%.*}"
          docker buildx imagetools create \
            --tag "${IMAGE}:${minor}" \
            --tag "${IMAGE}:${major}" \
            --tag "${IMAGE}:latest" \
            "${IMAGE}@${DIGEST}"
