name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.x'
          check-latest: true
          cache: true
      - name: Format
        run: test -z "$(gofmt -l cmd internal web)"
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race -cover ./...
      - name: Vulnerability check
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.5.0 ./...

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Verify generated API types
        run: npm run api:check
      - run: npm run lint
      - run: npm run format:check
      - run: npm run test -- --run
      - run: npm run build
      - run: npm audit --audit-level=high

  e2e:
    name: End-to-end
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.x'
          check-latest: true
          cache: true
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            e2e/package-lock.json
      - name: Build application
        run: |
          cd frontend
          npm ci
          npm run build
          cd ..
          CGO_ENABLED=0 go build -trimpath -o bin/nomadbank ./cmd/nomadbank
      - name: Start application
        run: |
          mkdir -p "$RUNNER_TEMP/nomadbank-data"
          DATA_DIR="$RUNNER_TEMP/nomadbank-data" ./bin/nomadbank &
      - name: Wait for readiness
        run: |
          for attempt in {1..30}; do
            curl --fail --silent http://127.0.0.1:8080/health/ready && exit 0
            sleep 1
          done
          exit 1
      - name: Install Playwright
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run core flow
        working-directory: e2e
        run: npm test -- --project=chromium
        env:
          BASE_URL: http://127.0.0.1:8080

  container:
    name: Container
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Build image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: false
          load: true
          tags: nomadbank:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke test image
        run: |
          docker run --detach --name nomadbank-ci --publish 127.0.0.1:8080:8080 nomadbank:ci
          trap 'docker rm --force --volumes nomadbank-ci >/dev/null 2>&1' EXIT
          for attempt in {1..30}; do
            curl --fail --silent http://127.0.0.1:8080/health/ready && exit 0
            sleep 1
          done
          docker logs nomadbank-ci
          exit 1

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: never
