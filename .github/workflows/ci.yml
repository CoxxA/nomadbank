name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          check-latest: true
          cache: true
      - name: Format
        run: test -z "$(gofmt -l cmd internal web)"
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race -coverprofile=coverage.out ./...
      - name: Vulnerability check
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.5.0 ./...
      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: coverage.out
          fail_ci_if_error: false

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Verify generated API types
        run: npm run api:check
      - run: npm run lint
      - run: npm run format:check
      - run: npm run test -- --run
      - run: npm run build
      - run: npm audit --audit-level=high

  e2e:
    name: End-to-end
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          check-latest: true
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            e2e/package-lock.json
      - name: Build application
        run: |
          cd frontend
          npm ci
          npm run build
          cd ..
          CGO_ENABLED=0 go build -trimpath -o bin/nomadbank ./cmd/nomadbank
      - name: Start application
        run: |
          mkdir -p "$RUNNER_TEMP/nomadbank-data"
          DATA_DIR="$RUNNER_TEMP/nomadbank-data" ./bin/nomadbank &
      - name: Wait for readiness
        run: |
          for attempt in {1..30}; do
            curl --fail --silent http://127.0.0.1:8080/health/ready && exit 0
            sleep 1
          done
          exit 1
      - name: Install Playwright
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run core flow
        working-directory: e2e
        run: npm test -- --project=chromium
        env:
          BASE_URL: http://127.0.0.1:8080

  container:
    name: Container
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: nomadbank:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke test image
        run: |
          docker run --detach --name nomadbank-ci --publish 127.0.0.1:8080:8080 nomadbank:ci
          trap 'docker rm --force --volumes nomadbank-ci >/dev/null 2>&1' EXIT
          for attempt in {1..30}; do
            curl --fail --silent http://127.0.0.1:8080/health/ready && exit 0
            sleep 1
          done
          docker logs nomadbank-ci
          exit 1

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
