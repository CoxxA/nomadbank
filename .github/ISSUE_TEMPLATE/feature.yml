name: 功能建议
description: 提议一个适合个人自托管场景的改进
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 需要解决的问题
      description: 请先描述用户问题，而不是具体技术方案。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
    validations:
      required: true
  - type: checkboxes
    id: scope
    attributes:
      label: 范围确认
      options:
        - label: 该建议适用于单实例、单所有者的自托管工具
          required: true
        - label: 该建议不会要求 NomadBank 保存银行密码或自动执行转账
          required: true
