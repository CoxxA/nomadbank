name: Bug 报告
description: 报告可以稳定复现的问题
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: 安全漏洞请按 SECURITY.md 私下报告，不要创建公开 Issue。
  - type: input
    id: version
    attributes:
      label: NomadBank 版本
      placeholder: 例如 2.0.0 或提交 SHA
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: 部署方式
      options: [Docker Compose, Docker Run, 发布二进制, 源码运行]
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请使用脱敏数据描述最短复现流程。
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 日志或截图
      description: 不要提交 Cookie、数据库、密码或真实账户信息。
