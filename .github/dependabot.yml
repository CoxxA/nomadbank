version: 2

updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(deps)
    labels: [dependencies, go]

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(deps)
    labels: [dependencies, frontend]
    groups:
      minor-and-patch:
        patterns: ['*']
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /e2e
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Shanghai
    open-pull-requests-limit: 3
    commit-message:
      prefix: chore(deps)
    labels: [dependencies, e2e]
    groups:
      minor-and-patch:
        patterns: ['*']
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Shanghai
    open-pull-requests-limit: 3
    commit-message:
      prefix: chore(ci)
    labels: [dependencies, ci]

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Shanghai
    open-pull-requests-limit: 2
    commit-message:
      prefix: chore(docker)
    labels: [dependencies, docker]
