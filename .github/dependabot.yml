version: 2

updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 3
    commit-message:
      prefix: chore(deps)
    labels: [dependencies, go]
    groups:
      security-updates:
        applies-to: security-updates
        patterns: ["*"]
      minor-and-patch:
        applies-to: version-updates
        patterns: ["*"]
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 2
    commit-message:
      prefix: chore(deps)
    labels: [dependencies, frontend]
    # CI, Docker, and release builds use Node 24 LTS. Security updates remain enabled.
    ignore:
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
    groups:
      security-updates:
        applies-to: security-updates
        patterns: ["*"]
      minor-and-patch:
        applies-to: version-updates
        patterns: ["*"]
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /e2e
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 2
    commit-message:
      prefix: chore(deps)
    labels: [dependencies, e2e]
    # Keep test types aligned with the Node 24 LTS runtime used by CI.
    ignore:
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
    groups:
      security-updates:
        applies-to: security-updates
        patterns: ["*"]
      minor-and-patch:
        applies-to: version-updates
        patterns: ["*"]
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 2
    commit-message:
      prefix: chore(ci)
    labels: [dependencies, ci]
    groups:
      security-updates:
        applies-to: security-updates
        patterns: ["*"]
      minor-and-patch:
        applies-to: version-updates
        patterns: ["*"]
        update-types: [minor, patch]

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 1
    commit-message:
      prefix: chore(docker)
    labels: [dependencies, docker]
    # Major Node upgrades are reviewed when the next release reaches LTS.
    ignore:
      - dependency-name: node
        update-types: ["version-update:semver-major"]
    groups:
      security-updates:
        applies-to: security-updates
        patterns: ["*"]
      minor-and-patch:
        applies-to: version-updates
        patterns: ["*"]
        update-types: [minor, patch]
